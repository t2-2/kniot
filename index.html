<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>רשימת קניות</title>

<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#f4f6f9;
  --card:#fff;
  --primary:#4f46e5;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --highlight:#fef08a;
}

*{
  box-sizing:border-box;
  font-family:Assistant,sans-serif;
}

body{
  margin:0;
  background:var(--bg);
  padding:12px;
}

.container{
  max-width:100%;
  margin:auto;
  background:var(--card);
  border-radius:14px;
  padding:14px;
}

/* MOBILE FIRST */
h1{
  font-size:20px;
  text-align:center;
  color:var(--primary);
  margin:10px 0 20px;
}

.category{
  margin-bottom:18px;
}

.category-title{
  font-size:15px;
  font-weight:700;
  color:var(--primary);
  border-bottom:1px solid var(--border);
  padding-bottom:5px;
  margin-bottom:10px;
}

.item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border:1px solid var(--border);
  border-radius:10px;
  margin-bottom:8px;
  background:#fafafa;
  font-size:14px;
}

.item input{
  width:18px;
  height:18px;
}

.item.checked{
  opacity:.5;
  text-decoration:line-through;
}

.item.highlight{
  background:var(--highlight);
}

/* DESKTOP */
@media (min-width:768px){
  .container{max-width:900px;padding:25px;}
  h1{font-size:26px;}
  .item{font-size:15px;}
}
</style>
</head>

<body>

<div class="container">
  <h1>רשימת קניות</h1>
  <div id="app"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBmULlsLAzfsoW4_RaUwklDWxV6JtR-6bA",
  authDomain: "kniot-769e4.firebaseapp.com",
  databaseURL: "https://kniot-769e4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kniot-769e4",
  storageBucket: "kniot-769e4.appspot.com",
  messagingSenderId: "248826431047",

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db,"shopping_items");

/* ===== כל הרשימה שלך עם כמויות ===== */

  ["ירקות, פירות ועשבי תיבול","פטריות"],
  ["ירקות, פירות ועשבי תיבול","קישואים זוקיני 4"],

  ["ירקות, פירות ועשבי תיבול","בצל סגול"],
  ["ירקות, פירות ועשבי תיבול","גזרים"],
  ["ירקות, פירות ועשבי תיבול","נענע"],

  ["ירקות, פירות ועשבי תיבול","פטרוזיליה"],
  ["ירקות, פירות ועשבי תיבול","לימונים 4"],
  ["ירקות, פירות ועשבי תיבול","סלק אדום 3"],
  ["ירקות, פירות ועשבי תיבול","אגסים"],
  ["ירקות, פירות ועשבי תיבול","דובדבנים"],
  ["ירקות, פירות ועשבי תיבול","ענבים"],
  ["ירקות, פירות ועשבי תיבול","קיווי"],

  // מקרר
  ["מוצרי מקרר","ביצים"],
  ["מוצרי מקרר","גבינה צהובה 2"],
  ["מוצרי מקרר","דנונה בר 4"],
  ["מוצרי מקרר","מילקי קטנים"],
  ["מוצרי מקרר","גבינת סקי 5%"],
  ["מוצרי מקרר","גבינה צפתית 5%"],
  ["מוצרי מקרר","שמנת מתוקה 4"],

  // יבש
  ["יבש ושימורים","שמן 6"],

  ["יבש ושימורים","פתיתים 4"],
  ["יבש ושימורים","עדשים שחורות"],
  ["יבש ושימורים","עדשים ירוקות"],
  ["יבש ושימורים","סויה כהה"],
  ["יבש ושימורים","סוכר"],

  ["יבש ושימורים","סודה לשתייה"],

  ["יבש ושימורים","קורנפלקס"],
  ["יבש ושימורים","לימון בבקבוק 3"],

  // חטיפים
  ["חטיפים ומתוקים","עוגיות מרוקאיות"],
  ["חטיפים ומתוקים","קינדר"],
  ["חטיפים ומתוקים","שוקולד מריר 6"],
  ["חטיפים ומתוקים","שוקולד חלב 3"],

  ["ניקוי וטואלטיקה","ווניש קליה"],

  // שתיה
  ["משקאות","קולה זירו 6"],
  ["משקאות","ספרייט זירו 6"]
];

/* ===== init firebase ===== */
onValue(dbRef,(snap)=>{
  if(!snap.exists()){
    const obj={};
    items.forEach((i,idx)=>{
      obj["p"+idx]={
        id:"p"+idx,
        category:i[0],
        name:i[1],
        checked:false
      };
    });
    set(dbRef,obj);
  }else{
    render(snap.val());
  }
});

/* ===== render ===== */
function render(data){
  const app=document.getElementById("app");
  app.innerHTML="";

  const arr=Object.values(data);
  const cats=[...new Set(arr.map(i=>i.category))];

  cats.forEach(cat=>{
    const section=document.createElement("div");
    section.className="category";

    const title=document.createElement("div");
    title.className="category-title";
    title.textContent=cat;

    section.appendChild(title);

    arr.filter(i=>i.category===cat).forEach(item=>{
      const div=document.createElement("div");
      div.className="item"+(item.checked?" checked":"");

      const cb=document.createElement("input");
      cb.type="checkbox";
      cb.checked=item.checked;

      cb.onchange=()=>update(ref(db,"shopping_items/"+item.id),{
        checked:!item.checked
      });

      const text=document.createElement("span");
      text.textContent=item.name;

      div.appendChild(cb);
      div.appendChild(text);
      section.appendChild(div);
    });

    app.appendChild(section);
  });
}
</script>

</body>
</html>
