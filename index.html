<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>רשימת קניות חכמה</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --primary-color: #4f46e5;
            --text-main: #1f2937;
            --text-muted: #4b5563;
            --border-color: #e5e7eb;
            --accent-highlight: #fef08a; /* צבע המרקר הצהוב מהתמונה */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Assistant', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        header h1 {
            font-size: 2rem;
            color: var(--primary-color);
            font-weight: 700;
        }

        /* סגנון לקטגוריות */
        .category-section {
            margin-bottom: 25px;
        }

        .category-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
        }

        /* רשימת המוצרים */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 12px;
        }

        .product-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            background: #fafafa;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
            user-select: none;
        }

        .product-item:hover {
            background: #f3f4f6;
        }

        .product-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-left: 10px;
            cursor: pointer;
            accent-color: var(--primary-color);
        }

        .product-name {
            font-size: 1rem;
            flex-grow: 1;
            color: var(--text-main);
        }

        /* סגנון למוצר שנקנה (מסומן) */
        .product-item.checked {
            background: #e2e8f0;
            opacity: 0.6;
        }

        .product-item.checked .product-name {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* סגנון מיוחד לפריטים שהיו מודגשים בצהוב בתמונה שלך */
        .product-item.highlighted {
            background-color: var(--accent-highlight);
            border-color: #fde047;
        }
        .product-item.highlighted:hover {
            background-color: #fef08a;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>רשימת הקניות שלי</h1>
    </header>

    <div id="shopping-list">
        </div>

        { id: "p71", name: "חטיפים (במבה, ביסלי גריל, ביסלי בצל, אפרופו)", category: "מתוקים וחטיפים", checked: false },
        { id: "p72", name: "בייגלה מקלות של חברת בייגלה בייגלה", category: "מתוקים וחטיפים", checked: false },

    ];

    // האזנה לשינויים ב-Firebase Realtime Database בזמן אמת
    onValue(listRef, (snapshot) => {
        const data = snapshot.val();
        
        // אם הדאטהבייס ריק לחלוטין (ריצה ראשונה), נכניס את המוצרים המובנים
        if (!data) {
            const initialDataObj = {};
            initialProducts.forEach(item => {
                initialDataObj[item.id] = item;
            });
            set(listRef, initialDataObj);
            return;
        }

        // רינדור של הרשימה לפי קטגוריות
        renderList(data);
    });

    // פונקציית הרינדור של ה-HTML
    function renderList(itemsObj) {
        const container = document.getElementById('shopping-list');
        container.innerHTML = ''; // ניקוי מקדים

        // הפיכת האובייקט למערך
        const itemsArray = Object.values(itemsObj);

        // שליחת כל הקטגוריות הייחודיות שיש לנו
        const categories = [...new Set(itemsArray.map(item => item.category))];

        categories.forEach(category => {
            // יצירת סקשן לקטגוריה
            const section = document.createElement('div');
            section.className = 'category-section';

            const title = document.createElement('div');
            title.className = 'category-title';
            title.innerText = category;
            section.appendChild(title);

            const grid = document.createElement('div');
            grid.className = 'products-grid';

            // סינון הפריטים השייכים לקטגוריה הזו
            const categoryItems = itemsArray.filter(item => item.category === category);

            categoryItems.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = `product-item ${item.checked ? 'checked' : ''} ${item.highlight ? 'highlighted' : ''}`;
                
                // לחיצה על כל אזור הפריט תשנה את מצב ה-Checkbox
                itemDiv.onclick = () => toggleItem(item.id, item.checked);

                const checkbox = document.createElement('input');
                checkbox.type = 'checkbox';
                checkbox.checked = item.checked;
                // מניעת הפעלה כפולה של ה-click
                checkbox.onclick = (e) => e.stopPropagation(); 
                checkbox.onchange = () => toggleItem(item.id, item.checked);

                const nameSpan = document.createElement('span');
                nameSpan.className = 'product-name';
                nameSpan.innerText = item.name;

                itemDiv.appendChild(checkbox);
                itemDiv.appendChild(nameSpan);
                grid.appendChild(itemDiv);
            });

            section.appendChild(grid);
            container.appendChild(section);
        });
    }

    // עדכון הסטטוס של מוצר ספציפי ב-Firebase
    function toggleItem(id, currentStatus) {
        const itemUpdateRef = ref(db, `shopping_items/${id}`);
        update(itemUpdateRef, {
            checked: !currentStatus
        });
    }
</script>

</body>
</html>
