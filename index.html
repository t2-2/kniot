<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>רשימת קניות</title>

<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Assistant;
  background:#f4f6f9;
  padding:10px;
}

.container{
  max-width:900px;
  margin:auto;
  background:#fff;
  border-radius:12px;
  padding:12px;
}

h1{
  text-align:center;
  color:#4f46e5;
  font-size:20px;
}

.category{
  margin-top:15px;
}

.title{
  font-weight:700;
  color:#4f46e5;
  border-bottom:1px solid #e5e7eb;
  padding:5px 0;
  margin-bottom:8px;
}

.item{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  margin-bottom:6px;
  border:1px solid #e5e7eb;
  border-radius:10px;
  background:#fafafa;
}

.item.checked{
  opacity:.5;
  text-decoration:line-through;
}

input{
  width:18px;
  height:18px;
}
</style>
</head>

<body>

<div class="container">
  <h1>רשימת קניות</h1>
  <div id="app"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBmULlsLAzfsoW4_RaUwklDWxV6JtR-6bA",
  authDomain: "kniot-769e4.firebaseapp.com",
  databaseURL: "https://kniot-769e4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kniot-769e4",
  storageBucket: "kniot-769e4.appspot.com",
  messagingSenderId: "248826431047",
  appId: "1:248826431047:web:ae92e53941b3534ef25362"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getDatabase(appFirebase);
const dbRef = ref(db,"shopping_items");

/* =========================
   🔥 כל הרשימה שלך
========================= */
const items = [

["ירקות","גזרים"],

["ירקות","בטטות 4"],

["מקרר","ביצים"],

["יבש","סוכר"],
["יבש","מלח"],
["יבש","סודה לשתייה"],

["חטיפים","עוגיות מרוקאיות"],

["ניקוי","סנו אוקסיג'ן"],

["משקאות","קולה זירו 6"],

];

/* =========================
   🔥 יצירה מחדש מלאה (פתרון לבעיה שלך)
========================= */
onValue(dbRef,(snap)=>{

  if(!snap.exists()){
    const obj = {};
    items.forEach((i,idx)=>{
      obj["p"+idx] = {
        id:"p"+idx,
        category:i[0],
        name:i[1],
        checked:false
      };
    });

    set(dbRef,obj);
    return;
  }

  render(snap.val());
});

/* =========================
   UI
========================= */
function render(data){
  const app=document.getElementById("app");
  app.innerHTML="";

  const arr=Object.values(data);
  const cats=[...new Set(arr.map(i=>i.category))];

  cats.forEach(cat=>{
    const box=document.createElement("div");
    box.className="category";

    const title=document.createElement("div");
    title.className="title";
    title.textContent=cat;

    box.appendChild(title);

    arr.filter(i=>i.category===cat).forEach(item=>{
      const div=document.createElement("div");
      div.className="item"+(item.checked?" checked":"");

      const cb=document.createElement("input");
      cb.type="checkbox";
      cb.checked=item.checked;

      cb.onchange=()=>update(ref(db,"shopping_items/"+item.id),{
        checked:!item.checked
      });

      const text=document.createElement("span");
      text.textContent=item.name;

      div.appendChild(cb);
      div.appendChild(text);
      box.appendChild(div);
    });

    app.appendChild(box);
  });
}
</script>

</body>
</html>
