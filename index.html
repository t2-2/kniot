<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>רשימת קניות חכמה</title>

<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#f4f6f9;
  --card:#fff;
  --primary:#4f46e5;
  --text:#1f2937;
  --muted:#6b7280;
  --border:#e5e7eb;
  --highlight:#fef08a;
}

* {
  box-sizing:border-box;
  font-family:Assistant,sans-serif;
  margin:0;
  padding:0;
}

body {
  background:var(--bg);
  display:flex;
  justify-content:center;
  padding:20px;
}

.container {
  width:100%;
  max-width:900px;
  background:var(--card);
  border-radius:16px;
  padding:25px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

header {
  text-align:center;
  border-bottom:1px solid var(--border);
  margin-bottom:20px;
  padding-bottom:10px;
}

h1 {
  color:var(--primary);
}

.category-title {
  margin:15px 0 10px;
  font-weight:700;
  color:var(--primary);
  border-bottom:1px solid var(--border);
  padding-bottom:5px;
}

.products-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:10px;
}

.product {
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  border:1px solid var(--border);
  border-radius:8px;
  cursor:pointer;
  background:#fafafa;
}

.product:hover {
  background:#f3f4f6;
}

.product.checked {
  opacity:0.5;
  text-decoration:line-through;
}

.product.highlight {
  background:var(--highlight);
}

input[type=checkbox] {
  width:18px;
  height:18px;
  accent-color:var(--primary);
}
</style>
</head>

<body>

<div class="container">
  <header>
    <h1>רשימת קניות</h1>
  </header>

  <div id="app"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBmULlsLAzfsoW4_RaUwklDWxV6JtR-6bA",
  authDomain: "kniot-769e4.firebaseapp.com",
  databaseURL: "https://kniot-769e4-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "kniot-769e4",
  storageBucket: "kniot-769e4.appspot.com",
  messagingSenderId: "248826431047",
  appId: "1:248826431047:web:ae92e53941b3534ef25362"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const dbRef = ref(db, "shopping_items");

const initialProducts = [
  {id:"1",name:"מלפפונים",category:"ירקות",checked:false},
  {id:"2",name:"עגבניות",category:"ירקות",checked:false},
  {id:"3",name:"ביצים",category:"מקרר",checked:false},
  {id:"4",name:"חלב",category:"מקרר",checked:false},
  {id:"5",name:"ווניש קליה",category:"ניקוי",checked:false,highlight:true}
];

// יצירה ראשונית אם ריק
onValue(dbRef, snap => {
  if(!snap.exists()){
    const obj = {};
    initialProducts.forEach(i => obj[i.id]=i);
    set(dbRef,obj);
  } else {
    render(snap.val());
  }
});

function render(data){
  const app = document.getElementById("app");
  app.innerHTML="";

  const items = Object.values(data);
  const cats = [...new Set(items.map(i=>i.category))];

  cats.forEach(cat=>{
    const title = document.createElement("div");
    title.className="category-title";
    title.textContent=cat;

    const grid = document.createElement("div");
    grid.className="products-grid";

    items.filter(i=>i.category===cat).forEach(item=>{
      const div = document.createElement("div");
      div.className = "product " +
        (item.checked ? "checked " : "") +
        (item.highlight ? "highlight" : "");

      div.onclick = () => update(ref(db,"shopping_items/"+item.id),{
        checked: !item.checked
      });

      const cb = document.createElement("input");
      cb.type="checkbox";
      cb.checked=item.checked;
      cb.onclick=e=>e.stopPropagation();
      cb.onchange=()=>div.onclick();

      const name=document.createElement("span");
      name.textContent=item.name;

      div.appendChild(cb);
      div.appendChild(name);
      grid.appendChild(div);
    });

    app.appendChild(title);
    app.appendChild(grid);
  });
}
</script>

</body>
</html>
